<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Plant Disease Detection</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        color: #17202a;
        background: #f4f7f2;
        display: grid;
        place-items: center;
      }

      main {
        width: min(92vw, 720px);
        background: #ffffff;
        border: 1px solid #d8e2d2;
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 12px 32px rgba(23, 32, 42, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 20px;
        color: #566573;
      }

      form {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      input[type="file"] {
        flex: 1;
        min-width: 240px;
      }

      button {
        border: 0;
        border-radius: 6px;
        background: #2e7d32;
        color: #ffffff;
        font-weight: 700;
        padding: 11px 18px;
        cursor: pointer;
      }

      section {
        margin-top: 24px;
        border-top: 1px solid #e5ebe1;
        padding-top: 20px;
      }

      img {
        width: min(100%, 320px);
        border-radius: 8px;
        border: 1px solid #d8e2d2;
      }

      .result {
        font-size: 20px;
        font-weight: 700;
        margin: 12px 0 6px;
      }

      .error {
        color: #b42318;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Plant Disease Detection</h1>
      <p>Upload a leaf image and the trained model will return the predicted class.</p>

      <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <button type="submit">Predict</button>
      </form>

      {% if error %}
      <section>
        <p class="error">{{ error }}</p>
      </section>
      {% endif %}

      {% if prediction %}
      <section>
        {% if image_data %}
        <img src="data:image/jpeg;base64,{{ image_data }}" alt="Uploaded plant leaf">
        {% endif %}
        <p class="result">{{ prediction["class"] }}</p>
        <p>Confidence: {{ prediction["confidence"] }}</p>
      </section>
      {% endif %}
    </main>
  </body>
</html>
