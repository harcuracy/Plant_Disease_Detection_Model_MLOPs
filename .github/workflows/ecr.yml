name: CI/CD Pipeline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: plant-disease-detection

permissions:
  contents: read

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyyaml fastapi python-multipart pillow numpy pytest httpx

      - name: Compile Python source
        run: python -m compileall app.py main.py template.py src tests

      - name: Run tests
        run: pytest -q

      - name: Validate YAML files
        run: |
          python - <<'PY'
          import yaml
          from pathlib import Path

          for file_path in [
              Path("config/config.yaml"),
              Path("params.yaml"),
              Path("dvc.yaml"),
              Path(".github/workflows/ecr.yml"),
          ]:
              with file_path.open(encoding="utf-8") as file:
                  yaml.safe_load(file)
              print(f"validated {file_path}")
          PY

      - name: Validate notebook JSON
        run: |
          python - <<'PY'
          import json
          json.load(open("research/trials.ipynb", encoding="utf-8"))
          print("validated research/trials.ipynb")
          PY

  build-and-push:
    name: Build Docker Image and Push to ECR
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if missing
        if: github.event_name != 'pull_request'
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY"

      - name: Build Docker image for pull request
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.ECR_REPOSITORY }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker image to ECR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pushed image URI
        if: github.event_name != 'pull_request'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Image pushed:"
          echo "$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          echo "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
