stages:
  data_ingestion:
    cmd: python src/cnnClassifier/pipeline/stage_01_data_ingestion.py
    deps:
      - src/cnnClassifier/pipeline/stage_01_data_ingestion.py
      - src/cnnClassifier/components/data_ingestion.py
      - config/config.yaml
      - params.yaml
    outs:
      - artifacts/data_ingestion/subset

  prepare_base_model:
    cmd: python src/cnnClassifier/pipeline/stage_02_prepare_base_model.py
    deps:
      - src/cnnClassifier/pipeline/stage_02_prepare_base_model.py
      - src/cnnClassifier/components/prepare_base_model.py
      - artifacts/data_ingestion/subset/train
      - config/config.yaml
      - params.yaml
    outs:
      - artifacts/prepare_base_model/base_model.h5
      - artifacts/prepare_base_model/base_model_updated.h5

  training:
    cmd: python src/cnnClassifier/pipeline/stage_03_training.py
    deps:
      - src/cnnClassifier/pipeline/stage_03_training.py
      - src/cnnClassifier/components/training.py
      - artifacts/prepare_base_model/base_model_updated.h5
      - artifacts/data_ingestion/subset/train
      - artifacts/data_ingestion/subset/validation
      - config/config.yaml
      - params.yaml
    outs:
      - artifacts/training/model.h5
      - artifacts/training/class_names.yaml

  evaluation:
    cmd: python src/cnnClassifier/pipeline/stage_04_evaluation.py
    deps:
      - src/cnnClassifier/pipeline/stage_04_evaluation.py
      - src/cnnClassifier/components/evaluation.py
      - artifacts/training/model.h5
      - artifacts/data_ingestion/subset/validation
      - config/config.yaml
      - params.yaml
    metrics:
      - artifacts/evaluation/scores.json:
          cache: false
